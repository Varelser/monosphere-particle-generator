  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalokagathia</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        /* Background is now handled by the React App component */
        font-family: 'Inter', sans-serif;
